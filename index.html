<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power Grade Library</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1A1A1F;
    --surface: #252530;
    --border: #2F2F3D;
    --accent-warm: #E8C170;
    --accent-cool: #7B9CDB;
    --text-primary: #E2E2EC;
    --text-muted: #A0A0B0;
    --text-dim: #5C5C70;
    --node-green: #5EC47B;
    --node-orange: #E8924A;
    --node-blue: #5B9BD5;
    --node-purple: #9B7BD5;
    --node-teal: #4EC4C0;
    --node-red: #D55B5B;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NODE GRAPH AMBIENT BACKGROUND ── */
  #node-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    opacity: 0.18;
  }

  /* ── LAYOUT ── */
  .wrap { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 24px; }

  /* ── HEADER ── */
  header {
    padding: 48px 0 40px;
    border-bottom: 1px solid var(--border);
  }

  .header-inner {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .header-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent-warm);
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(26px, 4vw, 42px);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    line-height: 1.1;
  }

  h1 span {
    color: var(--accent-warm);
  }

  .header-desc {
    color: var(--text-muted);
    font-size: 13px;
    max-width: 420px;
    margin-top: 10px;
    line-height: 1.7;
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
  }

  .meta-stat {
    text-align: right;
  }

  .meta-stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent-warm);
    line-height: 1;
  }

  .meta-stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .meta-divider {
    width: 1px;
    height: 40px;
    background: var(--border);
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    padding: 24px 0;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(26, 26, 31, 0.92);
    backdrop-filter: blur(12px);
    z-index: 10;
  }

  .filter-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-right: 4px;
    white-space: nowrap;
  }

  .filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }

  .filter-btn:hover {
    border-color: var(--accent-warm);
    color: var(--accent-warm);
  }

  .filter-btn.active {
    background: var(--accent-warm);
    border-color: var(--accent-warm);
    color: #1A1A1F;
  }

  /* ── GRADE GRID ── */
  .grade-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1px;
    background: var(--border);
    margin-top: 40px;
    border: 1px solid var(--border);
  }

  /* ── GRADE CARD ── */
  .grade-card {
    background: var(--surface);
    cursor: pointer;
    transition: background 0.15s ease;
    display: flex;
    flex-direction: column;
  }

  .grade-card:hover {
    background: #2C2C38;
  }

  .grade-card:hover .card-arrow { opacity: 1; transform: translateX(0); }

  /* ── BEFORE/AFTER SLIDER ── */
  .ba-container {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    overflow: hidden;
    flex-shrink: 0;
    user-select: none;
  }

  .ba-before, .ba-after {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .ba-after {
    clip-path: inset(0 50% 0 0);
    transition: clip-path 0s;
  }

  .ba-label {
    position: absolute;
    bottom: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 3px 6px;
    background: rgba(0,0,0,0.55);
    border-radius: 2px;
  }

  .ba-label-before { left: 8px; color: var(--text-muted); }
  .ba-label-after  { right: 8px; color: var(--accent-warm); }

  .ba-handle {
    position: absolute;
    top: 0;
    left: 50%;
    width: 2px;
    height: 100%;
    background: rgba(255,255,255,0.6);
    transform: translateX(-50%);
    cursor: ew-resize;
    pointer-events: none;
    z-index: 2;
  }

  .ba-handle::before, .ba-handle::after {
    content: '';
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    top: 50%;
    margin-top: -14px;
  }

  .ba-handle::after {
    width: 24px;
    height: 24px;
    margin-top: -12px;
    background: var(--bg);
    border: 2px solid rgba(255,255,255,0.8);
  }

  /* ── CARD BODY ── */
  .card-body {
    padding: 16px 18px 18px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .card-title-group { flex: 1; }

  .card-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.2;
  }

  .card-subtitle {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .card-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 2px;
    background: rgba(232, 193, 112, 0.12);
    color: var(--accent-warm);
    border: 1px solid rgba(232, 193, 112, 0.25);
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .card-category.cool {
    background: rgba(123, 156, 219, 0.12);
    color: var(--accent-cool);
    border-color: rgba(123, 156, 219, 0.25);
  }

  .card-category.neutral {
    background: rgba(160, 160, 176, 0.1);
    color: var(--text-muted);
    border-color: rgba(160, 160, 176, 0.2);
  }

  /* ── NODE TAGS ── */
  .node-list {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .node-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.06em;
    padding: 3px 7px;
    border-radius: 2px;
    border: 1px solid;
    position: relative;
  }

  .node-tag::before {
    content: '●';
    font-size: 6px;
    margin-right: 4px;
    vertical-align: middle;
  }

  .nt-green  { color: var(--node-green);  border-color: rgba(94,196,123,0.25);  background: rgba(94,196,123,0.07);  }
  .nt-orange { color: var(--node-orange); border-color: rgba(232,146,74,0.25);  background: rgba(232,146,74,0.07);  }
  .nt-blue   { color: var(--node-blue);   border-color: rgba(91,155,213,0.25);  background: rgba(91,155,213,0.07);  }
  .nt-purple { color: var(--node-purple); border-color: rgba(155,123,213,0.25); background: rgba(155,123,213,0.07); }
  .nt-teal   { color: var(--node-teal);   border-color: rgba(78,196,192,0.25);  background: rgba(78,196,192,0.07);  }
  .nt-red    { color: var(--node-red);    border-color: rgba(213,91,91,0.25);   background: rgba(213,91,91,0.07);   }

  /* ── CARD FOOTER ── */
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .card-node-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .card-arrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent-warm);
    opacity: 0;
    transform: translateX(-4px);
    transition: all 0.15s ease;
  }

  /* ── MODAL OVERLAY ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
    overflow-y: auto;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    max-width: 720px;
    width: 100%;
    border-radius: 4px;
    overflow: hidden;
    transform: translateY(16px);
    transition: transform 0.2s ease;
    position: relative;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 4px 10px;
    cursor: pointer;
    border-radius: 2px;
    z-index: 2;
    transition: all 0.15s;
  }

  .modal-close:hover { border-color: var(--text-muted); color: var(--text-primary); }

  .modal-preview {
    width: 100%;
    aspect-ratio: 16/9;
    position: relative;
    overflow: hidden;
  }

  .modal-ba-before, .modal-ba-after {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .modal-ba-after {
    clip-path: inset(0 50% 0 0);
  }

  .modal-ba-handle {
    position: absolute;
    top: 0;
    left: 50%;
    width: 2px;
    height: 100%;
    background: rgba(255,255,255,0.7);
    transform: translateX(-50%);
    cursor: ew-resize;
    pointer-events: none;
    z-index: 2;
  }

  .modal-ba-handle::after {
    content: '';
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid rgba(255,255,255,0.8);
    top: 50%;
    margin-top: -14px;
  }

  .modal-body {
    padding: 28px;
  }

  .modal-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .modal-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .modal-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ── NODE GRAPH VISUAL ── */
  .node-graph-section {
    margin-top: 24px;
  }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .node-graph-visual {
    background: #1E1E25;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 20px;
    overflow-x: auto;
  }

  .node-flow {
    display: flex;
    align-items: center;
    gap: 0;
    min-width: max-content;
  }

  .node-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .node-box {
    width: 100px;
    padding: 8px 10px;
    border: 1px solid;
    border-radius: 3px;
    text-align: center;
    position: relative;
  }

  .node-box-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    line-height: 1.3;
  }

  .node-box-type {
    font-family: 'JetBrains Mono', monospace;
    font-size: 7px;
    opacity: 0.6;
    margin-top: 2px;
  }

  .nb-green  { border-color: rgba(94,196,123,0.4);  background: rgba(94,196,123,0.06);  color: var(--node-green);  }
  .nb-orange { border-color: rgba(232,146,74,0.4);  background: rgba(232,146,74,0.06);  color: var(--node-orange); }
  .nb-blue   { border-color: rgba(91,155,213,0.4);  background: rgba(91,155,213,0.06);  color: var(--node-blue);   }
  .nb-purple { border-color: rgba(155,123,213,0.4); background: rgba(155,123,213,0.06); color: var(--node-purple); }
  .nb-teal   { border-color: rgba(78,196,192,0.4);  background: rgba(78,196,192,0.06);  color: var(--node-teal);   }
  .nb-red    { border-color: rgba(213,91,91,0.4);   background: rgba(213,91,91,0.06);   color: var(--node-red);    }
  .nb-dim    { border-color: var(--border);          background: rgba(255,255,255,0.03); color: var(--text-dim);    }

  .node-connector {
    width: 24px;
    height: 1px;
    background: var(--text-dim);
    position: relative;
    flex-shrink: 0;
  }

  .node-connector::after {
    content: '';
    position: absolute;
    right: -1px;
    top: -3px;
    width: 0;
    height: 0;
    border-left: 4px solid var(--text-dim);
    border-top: 3px solid transparent;
    border-bottom: 3px solid transparent;
  }

  /* ── NODE DESCRIPTIONS ── */
  .node-descriptions {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .node-desc-row {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 12px;
    align-items: start;
    padding: 8px 0;
    border-bottom: 1px solid rgba(47,47,61,0.6);
  }

  .node-desc-row:last-child { border-bottom: none; }

  .node-desc-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding-top: 1px;
  }

  .node-desc-text {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .node-desc-text em {
    font-style: normal;
    color: var(--text-primary);
    font-weight: 500;
  }

  /* ── USAGE NOTE ── */
  .usage-note {
    margin-top: 20px;
    padding: 14px 16px;
    background: rgba(232, 193, 112, 0.05);
    border-left: 2px solid var(--accent-warm);
    border-radius: 0 3px 3px 0;
  }

  .usage-note-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent-warm);
    margin-bottom: 6px;
  }

  .usage-note p {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.7;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    padding: 80px 24px;
    text-align: center;
    color: var(--text-dim);
    display: none;
  }

  .empty-state.visible { display: block; }

  .empty-state-icon {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty-state p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
  }

  /* ── SCROLL HINT ── */
  .scroll-hint {
    padding: 40px 0 60px;
    text-align: center;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .grade-grid { grid-template-columns: 1fr; }
    .header-inner { flex-direction: column; align-items: flex-start; }
    .modal-body { padding: 20px; }
    .node-desc-row { grid-template-columns: 90px 1fr; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>

<canvas id="node-canvas"></canvas>

<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div>
        <div class="header-label">Borneo Color Lab</div>
        <h1>Power Grade<br><span>Library</span></h1>
        <p class="header-desc">A reference index of production-ready grades. Each entry documents the node structure, tool chain, and intent — built for DaVinci Resolve.</p>
      </div>
      <div class="header-meta">
        <div class="meta-stat">
          <div class="meta-stat-num" id="grade-count">6</div>
          <div class="meta-stat-label">Grades</div>
        </div>
        <div class="meta-divider"></div>
        <div class="meta-stat">
          <div class="meta-stat-num">DV</div>
          <div class="meta-stat-label">Resolve</div>
        </div>
      </div>
    </div>
  </header>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <span class="filter-label">Filter —</span>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="cinematic">Cinematic</button>
    <button class="filter-btn" data-filter="commercial">Commercial</button>
    <button class="filter-btn" data-filter="skin">Skin Tone</button>
    <button class="filter-btn" data-filter="log">Log / LUT</button>
    <button class="filter-btn" data-filter="fx">FX / Style</button>
  </div>

  <!-- GRADE GRID -->
  <div class="grade-grid" id="grade-grid"></div>
  <div class="empty-state" id="empty-state">
    <div class="empty-state-icon">[ ]</div>
    <p>No grades in this category</p>
  </div>

  <div class="scroll-hint">── end of library ──</div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close">ESC ✕</button>
    <div class="modal-preview" id="modal-preview"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
/* ───────────────────────────────────────────────
   NODE CANVAS AMBIENT BACKGROUND
─────────────────────────────────────────────── */
(function() {
  const canvas = document.getElementById('node-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, nodes = [], edges = [];

  function init() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    nodes = [];
    edges = [];
    const count = Math.floor((W * H) / 28000);
    for (let i = 0; i < count; i++) {
      nodes.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.15,
        vy: (Math.random() - 0.5) * 0.15,
        r: Math.random() * 2 + 1,
        c: Math.random() > 0.5 ? '#E8C170' : '#7B9CDB'
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < 140) {
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.strokeStyle = `rgba(123,156,219,${0.35 * (1 - d/140)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    nodes.forEach(n => {
      n.x += n.vx; n.y += n.vy;
      if (n.x < 0 || n.x > W) n.vx *= -1;
      if (n.y < 0 || n.y > H) n.vy *= -1;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
      ctx.fillStyle = n.c;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', init);
  init();
  draw();
})();

      <div class="ba-after" id="ba-after-${g.id}" style="background: radial-gradient(ellipse at 60% 40%, ${g.afterAccent} 0%, ${g.afterBg} 60%);">
        <span class="ba-label ba-label-after">${g.name}</span>
      </div>
      <div class="ba-handle" id="ba-handle-${g.id}"></div>

    <div class="card-body">

          <div class="card-subtitle">${g.subtitle}</div>

        <div class="card-category ${g.categoryClass}">${g.categoryLabel}</div>
      </div>
      <div class="node-list">
        ${g.tags.map(t => `<span class="node-tag ${t.cls}">${t.label}</span>`).join('')}
      </div>
      <div class="card-footer">
        <span class="card-node-count">${g.nodeCount} nodes</span>
        <span class="card-arrow">View grade →</span>
      </div>
    </div>
  `;

  // card BA slider
  const container = card.querySelector('.ba-container');
  const after = card.querySelector(`#ba-after-${g.id}`);
  const handle = card.querySelector(`#ba-handle-${g.id}`);
  initSlider(container, after, handle);

  card.addEventListener('click', () => openModal(g));
  return card;
}

function renderGrid(filter) {
  grid.innerHTML = '';
  const filtered = filter === 'all' ? grades : grades.filter(g => g.category === filter);
  if (filtered.length === 0) {
    emptyState.classList.add('visible');
  } else {
    emptyState.classList.remove('visible');
    filtered.forEach(g => grid.appendChild(buildCard(g)));
  }
  document.getElementById('grade-count').textContent = filtered.length;
}

renderGrid('all');

/* ───────────────────────────────────────────────
   BEFORE/AFTER SLIDER
─────────────────────────────────────────────── */
function initSlider(container, after, handle) {
  let dragging = false;

  function setPos(x) {
    const rect = container.getBoundingClientRect();
    let pct = Math.max(0, Math.min(1, (x - rect.left) / rect.width));
    const rightPct = (1 - pct) * 100;
    after.style.clipPath = `inset(0 ${rightPct}% 0 0)`;
    handle.style.left = `${pct * 100}%`;
  }

  container.addEventListener('mousedown', e => {
    e.stopPropagation();
    dragging = true;
    setPos(e.clientX);
  });
  container.addEventListener('touchstart', e => {
    e.stopPropagation();
    dragging = true;
    setPos(e.touches[0].clientX);
  }, { passive: true });

  window.addEventListener('mousemove', e => { if (dragging) setPos(e.clientX); });
  window.addEventListener('touchmove', e => { if (dragging) setPos(e.touches[0].clientX); }, { passive: true });
  window.addEventListener('mouseup', () => { dragging = false; });
  window.addEventListener('touchend', () => { dragging = false; });
}
