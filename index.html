<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- Icon untuk Add to Home Screen -->
  <link rel="apple-touch-icon" href="logobcl.png">
  <link rel="icon" type="image/png" sizes="192x192" href="logobcl.png">
  <link rel="icon" type="image/png" sizes="512x512" href="logobcl.png">

  <!-- PWA Meta -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="BCL Library">
  <meta name="theme-color" content="#1c1c1c">
  <title>Power Grade & LUT Library — BORNEO COLOR LAB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1c1c1c;
      --surface:  #242424;
      --surface2: #2e2e2e;
      --border:   #393939;
      --accent:   #f0ff00;
      --text:     #f0f0f0;
      --muted:    #c3c3c3;
      --danger:   #ff4545;
      --success:  #49adf4;
      --wa:       #18ba55;
      --radius:   19px;
      --mono:     'DM Sans', sans-serif;
      --sans:     'DM Sans', sans-serif;
    }

    body.light {
      --bg:      #f5f5f5;
      --surface: #ffffff;
      --surface2:#eeeeee;
      --border:  #dddddd;
      --text:    #1a1a1a;
      --muted:   #888888;
      --accent:  #7a7a00;
    }

    body.light .hero-tag::after { background: rgba(100,100,0,0.2); }
    body.light .section.open .section-icon { background: var(--accent); border-color: var(--accent); }
    body.light .section.open .section-icon svg { color: #fff; }
    body.light .logo-mark img { filter: brightness(0) saturate(100%); }
    body.light .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
    body.light .node-dot { border-color: rgba(100,100,0,0.4); background: rgba(100,100,0,0.08); color: var(--accent); }
    body.light .node-dot.active { background: rgba(100,100,0,0.15); }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s;
      overscroll-behavior-y: contain;
    }

    .container { max-width: 640px; margin: 0 auto; padding: 0 20px 80px; }

    /* HEADER */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg);
      padding: max(13px, env(safe-area-inset-top)) 20px 10px;
      margin: 0 -20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      transition: background 0.3s, border-color 0.3s;
    }

    .logo-mark { width: 39px; height: 39px; background: transparent; border-radius: 8px; flex-shrink: 0; }
    .logo-mark img { width: 100%; height: 100%; object-fit: contain; border-radius: 8px; }
    .brand-name { font-family: var(--mono); font-size: 13px; font-weight: 700; letter-spacing: 0.08em; color: var(--text); line-height: 1; }
    .brand-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 3px; }

    .btn-theme {
      margin-left: auto; flex-shrink: 0;
      width: 34px; height: 34px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-theme:active { transform: scale(0.9); }
    .btn-theme svg { width: 16px; height: 16px; color: var(--muted); transition: color 0.2s; }
    .btn-theme:hover svg { color: var(--accent); }

    /* HERO */
    .hero {
      margin-bottom: 20px; padding: 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); position: relative; overflow: hidden;
      transition: background 0.3s, border-color 0.3s;
    }
    
    .hero-tag {
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .hero-tag::after { content: ""; flex: 1; height: 1px; background: rgba(240,255,0,0.2); }
    .hero-title {
      font-family: var(--mono); font-size: 19px; font-weight: 700;
      line-height: 1.3; color: var(--text); margin-bottom: 10px;
    }
    .hero-title span { color: var(--accent); }
    .hero-desc {
      font-size: 12px; color: var(--text); line-height: 1.8;
      padding-top: 12px; border-top: 1px solid var(--border);
    }
    .hero-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .hero-pill {
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      padding: 4px 10px; border-radius: 20px;
      border: 1px solid var(--border); color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* FILTER BAR */
    .filter-wrap {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .filter-btn {
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 6px 12px; border-radius: 20px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer;
      transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .filter-btn:active { transform: scale(0.95); }
    .filter-btn.active {
      background: rgba(240,255,0,0.1); border-color: rgba(240,255,0,0.4);
      color: var(--accent);
    }

    /* CAT LABEL */
    .cat-label {
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); margin: 24px 0 8px; padding-left: 2px;
    }

    /* PRODUCT CARD */
    .product-card {
      margin-bottom: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      transition: background 0.3s, border-color 0.3s;
    }

    /* BEFORE/AFTER SLIDER */
    .sim-wrap {
      position: relative; width: 100%; overflow: hidden;
      cursor: col-resize; user-select: none; -webkit-user-select: none;
      touch-action: none; aspect-ratio: 16/9; background: var(--surface2);
      border-radius: 0;
    }
    .sim-img {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      pointer-events: none;
    }
    .sim-img.sim-after { clip-path: inset(0 50% 0 0); transition: none; }
    .sim-divider {
      position: absolute; top: 0; left: 50%;
      transform: translateX(-50%);
      width: 1px; height: 100%;
      background: rgba(255,255,255,0.75);
      box-shadow: 0 0 8px rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .sim-handle {
      width: 20px; height: 20px; border-radius: 50%;
      background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: #333;
    }
    .sim-label {
      position: absolute; top: auto; bottom: 10px; z-index: 10;
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }
    .sim-label-before { right: 10px; color: var(--muted); }
    .sim-label-after  { left: 10px;  color: var(--muted); }

    /* GRADIENT PLACEHOLDER (when no image) */
    .sim-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;
      color: var(--muted); text-transform: uppercase;
    }

    /* NODE GRAPH PREVIEW */
    .node-graph-bar {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .node-graph-bar::-webkit-scrollbar { display: none; }

    .node-dot {
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 4px 9px; border-radius: 4px;
      border: 1px solid rgba(240,255,0,0.25);
      color: var(--accent);
      background: rgba(240,255,0,0.05);
      white-space: nowrap; flex-shrink: 0;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .node-dot::before {
      content: '●'; font-size: 6px;
      margin-right: 5px; vertical-align: middle;
      opacity: 0.6;
    }
    .node-dot.active {
      background: rgba(240,255,0,0.12);
      border-color: rgba(240,255,0,0.5);
    }
    .node-dot.disabled {
      opacity: 0.3; cursor: not-allowed;
      background: transparent;
      border-color: var(--border);
      color: var(--muted);
    }

    .node-connector {
      width: 16px; height: 1px; background: var(--border);
      flex-shrink: 0; position: relative;
    }
    .node-connector::after {
      content: ''; position: absolute; right: -1px; top: -3px;
      border-left: 4px solid var(--border);
      border-top: 3px solid transparent;
      border-bottom: 3px solid transparent;
    }

    /* NODE EFFECT INDICATOR */
    .node-effect {
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      min-height: 36px;
      display: flex; align-items: center;
    }
    .node-effect-text {
      font-family: var(--mono); font-size: 10px;
      letter-spacing: 0.05em; color: var(--muted);
      transition: color 0.2s;
    }
    .node-effect-text.lit { color: var(--accent); }

    /* CARD BODY */
    .card-body { padding: 14px 16px; }
    .card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px; margin-bottom: 10px;
    }
    .card-title {
      font-family: var(--mono); font-size: 14px; font-weight: 700;
      color: var(--text); line-height: 1.2;
    }
    .card-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

    .card-badge {
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 4px;
      background: rgba(240,255,0,0.08);
      border: 1px solid rgba(240,255,0,0.2);
      color: var(--accent); white-space: nowrap; flex-shrink: 0;
    }
    .card-badge.blue {
      background: rgba(73,173,244,0.08);
      border-color: rgba(73,173,244,0.2);
      color: var(--success);
    }

    .card-desc { font-size: 12px; color: var(--muted); line-height: 1.7; margin-bottom: 12px; }

    /* CARD FOOTER */
    .card-footer {
      display: flex; align-items: center;
      justify-content: space-between; gap: 8px;
      padding-top: 12px; border-top: 1px solid var(--border);
    }
    .card-price {
      font-family: var(--mono); font-size: 16px; font-weight: 700;
      color: var(--accent);
    }
    .card-price-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }

    .btn-buy {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 16px; border-radius: 20px;
      background: var(--accent); border: none;
      font-family: var(--mono); font-size: 11px; font-weight: 700;
      letter-spacing: 0.06em; color: #000; cursor: pointer;
      text-decoration: none;
      transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .btn-buy:active { transform: scale(0.96); opacity: 0.9; }

    /* USAGE NOTE INSIDE CARD */
    .usage-note {
      margin-top: 10px;
      padding: 10px 12px;
      background: rgba(240,255,0,0.04);
      border-left: 2px solid rgba(240,255,0,0.3);
      border-radius: 0 8px 8px 0;
      font-size: 12px; color: var(--muted); line-height: 1.7;
    }
    .usage-note strong { color: var(--accent); }

    /* COMPAT CHIPS */
    .compat-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .compat-chip {
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      padding: 3px 8px; border-radius: 20px;
      border: 1px solid var(--border); color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center; padding: 60px 20px;
      display: none;
    }
    .empty-state.visible { display: block; }
    .empty-state-text {
      font-family: var(--mono); font-size: 11px;
      letter-spacing: 0.1em; color: var(--muted);
    }

    /* FLOATING WA */
    .btn-wa-float {
      position: fixed; bottom: 24px; right: 20px; z-index: 99;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 12px;
      background: var(--wa); border-radius: 50px;
      font-family: var(--mono); font-size: 12px; font-weight: 700;
      letter-spacing: 0.08em; color: #fff; text-decoration: none;
      box-shadow: 0 4px 20px rgba(24,186,85,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-wa-float:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(24,186,85,0.25); }

    /* BACK TO TOP */
    .btn-top {
      position: fixed; bottom: 24px; left: 20px; z-index: 99;
      width: 44px; height: 44px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-top.visible { opacity: 1; pointer-events: auto; }
    .btn-top:active { transform: scale(0.92); }
    .btn-top svg { width: 18px; height: 18px; color: var(--muted); }

    /* FOOTER */
    .footer-text { font-size: 12px; color: var(--muted); line-height: 1.7; }

    .dot-a1 {
      position: relative; width: 8px; height: 8px;
      border-radius: 50%; background: var(--accent); flex-shrink: 0;
    }
    .dot-a1::after {
      content: ''; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%); width: 8px; height: 8px;
      border-radius: 50%; background: var(--accent);
      animation: dotPulse 2s ease-out infinite;
    }
    @keyframes dotPulse {
      0%   { transform: translate(-50%,-50%) scale(1); opacity: 0.8; }
      100% { transform: translate(-50%,-50%) scale(3); opacity: 0; }
    }

    @keyframes fadeInBody {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeInBody 0.35s ease-out forwards; }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }

    /* EXPANDED CARD (mirip section guide.html) */
    .card-expanded {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      margin-bottom: 10px;
      scroll-margin-top: 80px;
    }

    .card-exp-header {
      padding: 14px 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      user-select: none; -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .card-exp-header:active { background: var(--surface2); }
    .card-expanded.open .card-exp-header { border-bottom-color: var(--border); }

    .card-exp-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }

    .card-exp-icon {
      width: 37px; height: 37px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
      transition: background 0.2s, border-color 0.2s;
    }
    .card-exp-icon img, .card-exp-icon .icon-grad {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .card-expanded.open .card-exp-icon { border-color: rgba(240,255,0,0.4); }

    .card-exp-title { font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: var(--text); }
    .card-exp-sub { font-size: 11px; color: var(--accent); margin-top: 2px; }

    .card-exp-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .card-exp-chevron {
      font-size: 12px; color: var(--text); flex-shrink: 0;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .card-expanded.open .card-exp-chevron { transform: rotate(180deg); }

    .card-exp-body { display: none; }
    .card-expanded.open .card-exp-body {
      display: block;
      animation: fadeInBody 0.4s ease-out forwards;
    }

    .scene-tabs {
      display: flex; gap: 5px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    .scene-tab {
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; padding: 5px 10px; border-radius: 20px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer;
      transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .scene-tab.active {
      background: rgba(240,255,0,0.08);
      border-color: rgba(240,255,0,0.35);
      color: var(--accent);
    }

    .btn-share {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 9px 14px; border-radius: 20px;
      background: transparent;
      border: 1px solid var(--border);
      font-family: var(--mono); font-size: 11px; font-weight: 700;
      letter-spacing: 0.06em; color: var(--muted); cursor: pointer;
      transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .btn-share:active { transform: scale(0.96); }
    .btn-share.copied { border-color: rgba(240,255,0,0.4); color: var(--accent); }

    .card-expanded {
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease, background 0.3s, border-color 0.3s;
    }
    .card-expanded.visible {
      opacity: 1;
      transform: translateY(0);
    }
    
  </style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-mark"><img src="logobcl.png" alt="Logo"></div>
    <div>
      <div class="brand-name">BORNEO COLOR LAB</div>
    </div>
    <button class="btn-theme" onclick="toggleTheme()" title="Ganti tema">
      <svg id="iconTheme" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>
  </div>

  <!-- HERO -->
  <div class="hero">
    <canvas id="heroCanvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:0.2;"></canvas>
    <div style="position:relative;z-index:1;">
      <div class="hero-tag">Creative Color Tools</div>
      <div class="hero-title">Power Grade & <span>LUT Library</span></div>
      <div class="hero-desc">Geser slider pada setiap produk untuk melihat perbedaan before-after secara langsung.</div>
    </div>
  </div>

  <!-- FILTER -->
  <div class="filter-wrap" id="filterWrap">
    <button class="filter-btn active" data-filter="all">Semua</button>
    <button class="filter-btn" data-filter="powergrade">Power Grade</button>
    <button class="filter-btn" data-filter="lut">LUT Pack</button>
    <button class="filter-btn" data-filter="cinematic">Cinematic</button>
    <button class="filter-btn" data-filter="skin">Skin Tone</button>
  </div>

  <!-- PRODUCT LIST -->
  <div id="productList"></div>
  <div class="empty-state" id="emptyState">
    <div class="empty-state-text">[ ] Tidak ada produk di kategori ini</div>
  </div>
  
  <!-- TOMBOL WA -->
  <div style="text-align:center;padding:32px 0 0;border-top:1px solid var(--border);">
      <a href="https://wa.me/6282252445233?text=Halo%20Borneo%20Color%20Lab!%20Saya%20mau%20tanya%20tentang%20Power%20Grade%20%26%20LUT%20yang%20tersedia%20%F0%9F%98%8A"
        style="display:inline-flex;align-items:center;gap:7px;padding:11px 20px;border-radius:20px;background:var(--wa);font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:0.06em;color:#fff;text-decoration:none;-webkit-tap-highlight-color:transparent;"
        target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
          <path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.79.49 3.57 1.4 5.12L2 22l5.12-1.51c1.49.82 3.17 1.26 4.92 1.26 5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.84 9.84 0 0012.04 2z"/>
        </svg>
        Tanya-tanya
      </a>

/* ── TOGGLE CARD ── */
function toggleCard(pid) {
  var allCards = document.querySelectorAll('.card-expanded');
  allCards.forEach(function(c) {
    if (c.id !== 'card-exp-' + pid && c.classList.contains('open')) {
      c.classList.remove('open');
    }
  });

  var card = document.getElementById('card-exp-' + pid);
  if (!card) return;
  var isOpen = card.classList.toggle('open');
  if (isOpen) {
    sliderStates[pid] = 0.5;
    setTimeout(function() {
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      initSlider(pid);
      setTimeout(function() { autoAnimate(pid); }, 300);
    }, 50);
  }
}

function openCard(pid) {
  var card = document.getElementById('card-exp-' + pid);
  if (!card) return;
  if (!card.classList.contains('open')) {
    card.classList.add('open');
    setTimeout(function() {
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      initSlider(pid);
      autoAnimate(pid);
    }, 50);
  } else {
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function renderProducts() {
  var list = document.getElementById('productList');
  var empty = document.getElementById('emptyState');
  list.innerHTML = '';

  var filtered = getFilteredProducts();
  if (filtered.length === 0) {
    empty.classList.add('visible');
    return;
  }
  empty.classList.remove('visible');

  filtered.forEach(function(p, i) {
    var card = buildExpandedCard(p);
    list.appendChild(card);
    setTimeout(function() {
      card.classList.add('visible');
    }, 100 + i * 120);
  });
}
  
/* ── SLIDER ── */
function initSlider(pid) {
  var wrap = document.getElementById('sim-' + pid);
  if (!wrap) return;

  var pos = sliderStates[pid] !== undefined ? sliderStates[pid] : 0.5;
  updateSlider(pid, pos);

  var dragging = false;

  function getPos(e) {
    var rect = wrap.getBoundingClientRect();
    var cx = e.touches ? e.touches[0].clientX : e.clientX;
    return Math.min(Math.max((cx - rect.left) / rect.width, 0.02), 0.98);
  }

  wrap.addEventListener('mousedown', function(e) {
    dragging = true;
    var p = getPos(e); sliderStates[pid] = p; updateSlider(pid, p);
  });
  wrap.addEventListener('touchstart', function(e) {
    dragging = true;
    var p = getPos(e); sliderStates[pid] = p; updateSlider(pid, p);
    e.preventDefault();
  }, { passive: false });

  window.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var p = getPos(e); sliderStates[pid] = p; updateSlider(pid, p);
  });
  window.addEventListener('touchmove', function(e) {
    if (!dragging) return;
    var p = getPos(e); sliderStates[pid] = p; updateSlider(pid, p);
  }, { passive: true });
  window.addEventListener('mouseup', function() { dragging = false; });
  window.addEventListener('touchend', function() { dragging = false; });
}

function updateSlider(pid, pos) {
  var after = document.getElementById('simAfter-' + pid);
  var divider = document.getElementById('simDiv-' + pid);
  if (!after || !divider) return;
  var pct = (pos * 100).toFixed(2);
  after.style.clipPath = 'inset(0 ' + (100 - pct) + '% 0 0)';
  divider.style.left = pct + '%';
}

function autoAnimate(pid) {
  var duration = 1100;
  var start = null;
  var from = 0.5, to = 0.82, returning = false;
  var cancelled = false;

  var wrap = document.getElementById('sim-' + pid);
  if (!wrap) return;

  function onDrag() { cancelled = true; }
  wrap.addEventListener('mousedown', onDrag, { once: true });
  wrap.addEventListener('touchstart', onDrag, { once: true });

  function step(ts) {
    if (cancelled) return;
    if (!start) start = ts;
    var progress = Math.min((ts - start) / duration, 1);
    var ease = progress < 0.5
      ? 2 * progress * progress
      : -1 + (4 - 2 * progress) * progress;
    var pos = returning
      ? to + (from - to) * ease
      : from + (to - from) * ease;
    sliderStates[pid] = pos;
    updateSlider(pid, pos);
    if (progress < 1) {
      requestAnimationFrame(step);
    } else if (!returning) {
      returning = true; start = null;
      setTimeout(function() { requestAnimationFrame(step); }, 500);
    } else {
      sliderStates[pid] = 0.5;
      updateSlider(pid, 0.5);
    }
  }
  requestAnimationFrame(step);
}

  function switchScene(pid, idx, el) {
  var p = products.find(function(x) { return x.id === pid; });
  if (!p) return;
  var sc = p.scenes[idx];

  var before = document.getElementById('simBefore-' + pid);
  var after = document.getElementById('simAfter-' + pid);
  if (before) before.src = sc.before;
  if (after) after.src = sc.after;

  var tabs = document.querySelectorAll('#sceneTabs-' + pid + ' .scene-tab');
  tabs.forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');

  sliderStates[pid] = 0.5;
  updateSlider(pid, 0.5);
  setTimeout(function() { autoAnimate(pid); }, 100);
}

/* ── NODE TOGGLE ── */
function toggleNode(pid, nidx, el) {
  var p = products.find(function(x) { return x.id === pid; });
  if (!p) return;
  var n = p.nodes[nidx];

  var effectText = document.getElementById('effectText-' + pid);
  if (effectText) {
    effectText.textContent = '● ' + n.label + ' — ' + n.desc;
    effectText.classList.add('lit');
  }

  if (el.classList.contains('disabled')) {
    el.classList.remove('disabled');
    n.enabled = true;
  } else {
    el.classList.add('disabled');
    n.enabled = false;
  }
}

  function shareProduct(pid, el) {
  var base = window.location.href.split('#')[0];
  var url = base + '#' + pid;

  if (navigator.share) {
    navigator.share({ title: document.title, url: url });
    return;
  }

  navigator.clipboard.writeText(url).then(function() {
    el.classList.add('copied');
    el.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><polyline points="20 6 9 17 4 12"/></svg> Tersalin!';
    setTimeout(function() {
      el.classList.remove('copied');
      el.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Bagikan';
    }, 2000);
  });
}

function handleHash() {
  var hash = window.location.hash.replace('#', '');

  (function() {
  var canvas = document.getElementById('heroCanvas');
  var ctx = canvas.getContext('2d');
  var nodes = [], W, H;

  function init() {
    var rect = canvas.parentElement.getBoundingClientRect();
    W = canvas.width = rect.width;
    H = canvas.height = rect.height;
    nodes = [];
    var count = Math.floor((W * H) / 5000);
    for (var i = 0; i < count; i++) {
      nodes.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.25,
        vy: (Math.random() - 0.5) * 0.25,
        r: Math.random() * 1.5 + 0.5,
        c: Math.random() > 0.6 ? '#f0ff00' : '#49adf4'
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (var i = 0; i < nodes.length; i++) {
      for (var j = i + 1; j < nodes.length; j++) {
        var dx = nodes[i].x - nodes[j].x;
        var dy = nodes[i].y - nodes[j].y;
        var d = Math.sqrt(dx*dx + dy*dy);
        if (d < 90) {
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.strokeStyle = 'rgba(73,156,219,' + (0.3 * (1 - d/90)) + ')';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    nodes.forEach(function(n) {
      n.x += n.vx; n.y += n.vy;
      if (n.x < 0 || n.x > W) n.vx *= -1;
      if (n.y < 0 || n.y > H) n.vy *= -1;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
      ctx.fillStyle = n.c;
      ctx.globalAlpha = 0.6;
      ctx.fill();
      ctx.globalAlpha = 1;
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', init);
  init();
  draw();
})();
  
</script>
